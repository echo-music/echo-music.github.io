    <!-- Dark Mode Script -->
    <script>
    (function() {
        // 获取保存的主题设置
        var savedTheme = localStorage.getItem('theme');
        var darkModeToggle = document.getElementById('darkModeToggle');
        var darkModeIcon = document.getElementById('darkModeIcon');

        // 应用主题
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                darkModeIcon.classList.remove('octicon-moon');
                darkModeIcon.classList.add('octicon-sun');
                darkModeToggle.title = '切换浅色模式';
            } else {
                document.body.classList.remove('dark-mode');
                darkModeIcon.classList.remove('octicon-sun');
                darkModeIcon.classList.add('octicon-moon');
                darkModeToggle.title = '切换深色模式';
            }
        }

        // 初始化主题
        if (savedTheme) {
            applyTheme(savedTheme);
        } else {
            // 检测系统偏好
            var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(prefersDark ? 'dark' : 'light');
        }

        // 切换按钮事件
        darkModeToggle.addEventListener('click', function() {
            var isDark = document.body.classList.contains('dark-mode');
            var newTheme = isDark ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // 监听系统主题变化
        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                if (!localStorage.getItem('theme')) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            });
        }
    })();
    </script>
